# Zola config — https://www.getzola.org/documentation/getting-started/configuration/
# base_url is the GitHub Pages project URL for now. To move to fossdot.in:
#   1. set base_url = "https://fossdot.in"
#   2. add static/CNAME containing: fossdot.in
#   3. set the custom domain under repo Settings -> Pages, and point DNS at GitHub.
base_url = "https://fossdot.github.io/fossdot-site"
title = "Vishal Arya"
description = "Personal site of Vishal Arya — building Bodhya, director at FOSS United."

default_language = "en"
generate_feeds = true
feed_filenames = ["atom.xml"]

compile_sass = false
minify_html = false
build_search_index = false

# Code highlighting is left off; code blocks are styled by static/style.css so
# they follow the light/dark theme.

[extra]
